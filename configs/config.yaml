#   max_open_conns: 25
#   max_idle_conns: 10
#   conn_max_lifetime: 300 # seconds

database:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "postgres"
  name: "ops-server"
  sslmode: "disable"
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime: 300 # seconds

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  pool_size: 10
  dial_timeout: 5
  read_timeout: 3
  write_timeout: 3

kafka:
  brokers:
    - "10.128.1.148:31636"
  group_id: "ops-server-consumer-group"
  topics:
    signin: "user.signin"
    signup: "user.signup"
    retry: "user.retry"
    dlq: "user.dlq"
  producer:
    batch_size: 100
    batch_timeout: 10 # ms
    required_acks: -1
  consumer:
    min_bytes: 10240 # 10KB
    max_bytes: 10485760 # 10MB
    max_wait: 500 # ms

jwt:
  secret: "change-me-in-production-use-env-var"
  access_ttl: 15 # minutes
  refresh_ttl: 10080 # minutes (7 days)

rate_limit:
  requests: 100
  window: 60 # seconds

observability:
  prometheus_port: 9090
  log_level: "info"

services:
  sampling: http://localhost:8082/api/v1
  billing: http://localhost:8083/api/v1
