paths:
  /audit/logs:
    get:
      parameters:
      - description: Service source
        in: query
        name: service
        type: string
      - description: Trace ID
        in: query
        name: traceId
        type: string
      - description: Request ID
        in: query
        name: requestId
        type: string
      - description: Date début (RFC3339)
        in: query
        name: from
        type: string
      - description: Date fin (RFC3339)
        in: query
        name: to
        type: string
      - description: Offset
        in: query
        name: offset
        type: integer
      - description: Limite
        in: query
        name: limit
        type: integer
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/ops-server_internal_interfaces_http_response.PaginatedData-models_LogResponse'
              type: object
      security:
      - BearerAuth: []
      summary: Lister les logs applicatifs (admin)
      tags:
      - audit
  /audit/trails:
    get:
      parameters:
      - description: 'Ressource (ex: user)'
        in: query
        name: resource
        type: string
      - description: UUID utilisateur
        in: query
        name: userId
        type: string
      - description: Date début (RFC3339)
        in: query
        name: from
        type: string
      - description: Date fin (RFC3339)
        in: query
        name: to
        type: string
      - description: Offset
        in: query
        name: offset
        type: integer
      - description: Limite
        in: query
        name: limit
        type: integer
      responses:
        "200":
          description: OK
