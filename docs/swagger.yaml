            - $ref: '#/definitions/response.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/ops-server_internal_interfaces_http_response.PaginatedData-models_AuditTrailResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Lister les audit trails (admin)
      tags:
      - audit
  /audit/trails/{id}:
    get:
      parameters:
      - description: UUID audit trail
        in: path
        name: id
        required: true
        type: string
      responses:
